<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="ballGrad" x1="30%" y1="20%" x2="70%" y2="80%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <linearGradient id="swishGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#065f46" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Swish trails (motion effect) -->
  <path d="M 8 68 Q 20 62, 30 58" stroke="url(#swishGrad)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M 5 78 Q 18 72, 32 66" stroke="url(#swishGrad)" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M 10 88 Q 22 80, 36 74" stroke="url(#swishGrad)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.3"/>

  <!-- Volleyball body -->
  <circle cx="65" cy="58" r="38" fill="url(#ballGrad)" filter="url(#shadow)"/>

  <!-- Volleyball seam lines -->
  <!-- Horizontal curve -->
  <path d="M 27 58 Q 45 45, 65 44 Q 85 43, 103 58" stroke="white" stroke-width="1.8" fill="none" opacity="0.35" stroke-linecap="round"/>
  <path d="M 27 58 Q 45 71, 65 72 Q 85 73, 103 58" stroke="white" stroke-width="1.8" fill="none" opacity="0.35" stroke-linecap="round"/>
  <!-- Vertical curves -->
  <path d="M 65 20 Q 52 35, 50 58 Q 48 81, 65 96" stroke="white" stroke-width="1.8" fill="none" opacity="0.35" stroke-linecap="round"/>
  <path d="M 42 25 Q 38 40, 40 58 Q 42 76, 50 92" stroke="white" stroke-width="1.5" fill="none" opacity="0.25" stroke-linecap="round"/>
  <path d="M 88 25 Q 92 40, 90 58 Q 88 76, 80 92" stroke="white" stroke-width="1.5" fill="none" opacity="0.25" stroke-linecap="round"/>

  <!-- Paper airplane -->
  <g transform="translate(58, 38) rotate(-15)">
    <polygon points="0,12 28,-2 8,8" fill="white" opacity="0.95"/>
    <polygon points="8,8 28,-2 12,18" fill="white" opacity="0.75"/>
    <line x1="8" y1="8" x2="28" y2="-2" stroke="white" stroke-width="0.5" opacity="0.5"/>
  </g>
</svg>
