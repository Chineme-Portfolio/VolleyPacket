<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 80" width="580" height="80">
  <defs>
    <linearGradient id="fBallGrad" x1="30%" y1="20%" x2="70%" y2="80%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <linearGradient id="fSwishGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- V -->
  <text x="0" y="60" font-family="Inter, Arial, Helvetica, sans-serif" font-weight="800" font-size="52" fill="#1f2937" letter-spacing="-1">V</text>

  <!-- The "O" replaced by volleyball icon -->
  <g transform="translate(35, 8)">
    <!-- Swish trails -->
    <path d="M -8 42 Q -2 38, 4 36" stroke="url(#fSwishGrad)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
    <path d="M -10 50 Q -3 46, 5 43" stroke="url(#fSwishGrad)" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.4"/>
    <path d="M -7 58 Q -1 53, 7 50" stroke="url(#fSwishGrad)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.3"/>

    <!-- Ball -->
    <circle cx="30" cy="34" r="26" fill="url(#fBallGrad)"/>

    <!-- Ball seam lines -->
    <path d="M 4 34 Q 16 24, 30 23 Q 44 22, 56 34" stroke="white" stroke-width="1.2" fill="none" opacity="0.35" stroke-linecap="round"/>
    <path d="M 4 34 Q 16 44, 30 45 Q 44 46, 56 34" stroke="white" stroke-width="1.2" fill="none" opacity="0.35" stroke-linecap="round"/>
    <path d="M 30 8 Q 22 20, 20 34 Q 18 48, 30 60" stroke="white" stroke-width="1.2" fill="none" opacity="0.35" stroke-linecap="round"/>
    <path d="M 16 11 Q 13 22, 14 34 Q 15 46, 22 57" stroke="white" stroke-width="1" fill="none" opacity="0.25" stroke-linecap="round"/>
    <path d="M 44 11 Q 47 22, 46 34 Q 45 46, 38 57" stroke="white" stroke-width="1" fill="none" opacity="0.25" stroke-linecap="round"/>

    <!-- Paper airplane on ball -->
    <g transform="translate(22, 22) rotate(-15) scale(0.7)">
      <polygon points="0,12 28,-2 8,8" fill="white" opacity="0.95"/>
      <polygon points="8,8 28,-2 12,18" fill="white" opacity="0.75"/>
    </g>
  </g>

  <!-- LLEYPACKET -->
  <text x="92" y="60" font-family="Inter, Arial, Helvetica, sans-serif" font-weight="800" font-size="52" fill="#1f2937" letter-spacing="-1">LLEY</text>
  <text x="260" y="60" font-family="Inter, Arial, Helvetica, sans-serif" font-weight="800" font-size="52" fill="#065f46" letter-spacing="-1">PACKET</text>
</svg>
